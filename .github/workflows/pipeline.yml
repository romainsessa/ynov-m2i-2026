name: CI CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Run tests
      run: mvn test --file demo/pom.xml
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7.0.1
      with:
        name: jacoco-report
        path: demo/target/site/jacoco
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: note/package-lock.json
    - name: Build 
      run: npm ci
      working-directory: note
    - name : Run tests
      run: npm run test:coverage
      working-directory: note
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7.0.1
      with:
        name: lcov-report
        path: note/coverage/lcov-report
  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@4
      with:
        java-version: 25
        distribution: temurin
        cache: maven
    - name: Start back
      run: | 
        mvn spring-boot:run --file demo/pom.xml &
        sleep 15
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: note/package-lock.json
    - name: Start front
      run: |
        npm run start &
        sleep 15
      working-directory: note
    - name : Run E2E tests
      uses: cypress-io/github-actions@v6
      with:
        working-directory: note
