name: CI CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  
jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up JDK
      uses: actions/setup-java@v5.3.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Run tests
      run: mvn test --file demo/pom.xml
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7.0.1
      with:
        name: jacoco-report
        path: demo/target/site/jacoco
  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7.0.0
    - name: Set up JDK
      uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: note/package-lock.json
    - name: Build 
      run: npm ci
      working-directory: note
    - name : Run tests
      run: npm run test:coverage
      working-directory: note
    - name: Upload Coverage Report
      uses: actions/upload-artifact@v7.0.1
      with:
        name: lcov-report
        path: note/coverage/lcov-report
  test-e2e:
    if: false
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
    - uses: actions/checkout@v7.0.0
    - uses: actions/setup-java@v5.3.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Start back
      run: | 
        mvn spring-boot:run --file demo/pom.xml &
        sleep 15
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: note/package-lock.json
    - name: Build front
      run: npm ci
      working-directory: note
    - name: Start front
      run: |
        npm run start &
        sleep 15
      working-directory: note
    - name : Run E2E tests
      uses: cypress-io/github-action@v7
      with:
        working-directory: note
  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend #to do -> test-e2e
    steps:
    - uses: actions/checkout@v7.0.0
    - uses: actions/setup-java@v5.3.0
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: build
      run: mvn package -DskipTests=true -file demo/pom.xml
    - name: Upload JAR file
      uses: actions/upload-artifact@v7.0.1
      with:
        name: backend.jar
        path: demo/target/*.jar
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-e2e
    steps:
    - uses: actions/checkout@v7.0.0
    - uses: actions/setup-node@v6.4.0
      with:
        node-version: '24'
        cache: npm
        cache-dependency-path: note/package-lock.json
    - name: Install
      run: npm ci
      working-directory: note
    - name: Build
      run: npm run build -- --configuration production
      working-directory: note
    - name: Upload dist directory
      uses: actions/upload-artifact@v7.0.1
      with:
        name: front-dist
        path: note/dist/
  docker-delivery:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
     - uses: actions/checkout@v7.0.0
     - name: Get backend
       uses: actions/download-artifact@v8.0.0
       with:
         name: backend.jar
         path: demo/target
     - name: Get frontend
       uses: actions/download-artifact@v8.0.0
       with:
         name: dist-front
         path: note/dist
     - name: Docker Login
       uses: docker/login-action@v4.2.0
       with:
         username: ${{ vars.DOCKERHUB_USERNAME }}
         password: ${{ secrets.DOCKERHUB_TOKEN }}
     - name: Docker build and push backend
       uses: docker/build-push-action@v7.2.0
       with:
         context: demo
         push: true
         tags: romainsessa/ynov-backend:latest
     - name: Docker build and push frontend
       uses: docker/build-push-action@v7.2.0
       with:
         context: note
         push: true
         tags: romainsessa/ynov-frontend:latest
